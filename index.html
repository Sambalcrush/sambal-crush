<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sambal Crush V14</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <section id="homeScreen" class="screen home-screen active">
      <div class="hero-card">
        <div class="hero-logo">SC</div>
        <div>
          <h1>Sambal Crush</h1>
          <p>Campaign redesign met een kronkelende roadmap, fullscreen levels en duidelijke win-flow.</p>
        </div>
      </div>

      <div class="hero-actions">
        <button id="playBtn" class="primary big-btn">Play</button>
        <button id="shopBtn" class="secondary">Shop</button>
        <button id="dailyBtn" class="secondary">Daily reward</button>
        <button id="chestsBtn" class="secondary">Chests</button>
      </div>

      <div class="home-stats">
        <div class="mini-stat"><span>Level</span><strong id="homeLevel">1</strong></div>
        <div class="mini-stat"><span>Muntjes</span><strong id="homeCoins">0</strong></div>
        <div class="mini-stat"><span>Gems</span><strong id="homeGems">0</strong></div>
        <div class="mini-stat"><span>Levens</span><strong id="homeLives">5</strong></div>
      </div>
    </section>

    <section id="mapScreen" class="screen map-screen">
      <div class="top-nav">
        <button id="backHomeBtn" class="nav-btn">← Home</button>
        <div class="campaign-title">
          <h2>Campaign map</h2>
          <p>Kies een level op het pad.</p>
        </div>
      </div>

      <div class="map-card">
        <div class="map-scroll" id="mapScroll">
          <svg class="map-path-svg" viewBox="0 0 1200 1600" preserveAspectRatio="none">
            <path d="M160 150 C460 60, 760 250, 980 180
                     C1160 130, 1050 360, 860 390
                     C600 440, 240 400, 160 610
                     C120 720, 230 860, 470 860
                     C770 860, 1080 760, 1030 1010
                     C980 1240, 650 1140, 420 1220
                     C160 1310, 170 1470, 420 1480
                     C760 1490, 1040 1400, 1030 1320"
                  fill="none" stroke="rgba(255,255,255,.28)" stroke-width="34" stroke-linecap="round"/>
            <path d="M160 150 C460 60, 760 250, 980 180
                     C1160 130, 1050 360, 860 390
                     C600 440, 240 400, 160 610
                     C120 720, 230 860, 470 860
                     C770 860, 1080 760, 1030 1010
                     C980 1240, 650 1140, 420 1220
                     C160 1310, 170 1470, 420 1480
                     C760 1490, 1040 1400, 1030 1320"
                  fill="none" stroke="rgba(255,255,255,.7)" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 28"/>
          </svg>

          <div id="mapNodes" class="map-nodes"></div>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="game-topbar">
        <button id="leaveLevelBtn" class="nav-btn">← Map</button>
        <div class="ingame-stats">
          <div class="stat"><span>Level</span><strong id="level">1</strong></div>
          <div class="stat"><span>Score</span><strong id="score">0</strong></div>
          <div class="stat"><span>Moves</span><strong id="moves">20</strong></div>
          <div class="stat"><span>Goal</span><strong id="goal">1200</strong></div>
        </div>
      </div>

      <div class="game-board-wrap">
        <canvas id="game" width="576" height="576"></canvas>
        <div id="comboOverlay" class="combo-overlay"></div>
        <div id="scorePopups" class="popup-layer"></div>
      </div>
    </section>

    <div id="winModal" class="modal hidden">
      <div class="modal-card">
        <h3 id="winTitle">Level gehaald!</h3>
        <p id="winText">Je hebt level 1 gehaald.</p>
        <div class="modal-actions">
          <button id="nextLevelBtn" class="primary">Volgende level</button>
          <button id="backToMapBtn" class="secondary">Terug naar map</button>
        </div>
      </div>
    </div>

    <div id="panelModal" class="modal hidden">
      <div class="modal-card">
        <h3 id="panelTitle">Panel</h3>
        <div id="panelBody" class="panel-body"></div>
        <div class="modal-actions">
          <button id="closePanelBtn" class="primary">Sluiten</button>
        </div>
      </div>
    </div>

    <div id="message" class="toast"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
